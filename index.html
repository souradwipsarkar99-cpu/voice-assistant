<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Voice Assistant</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#0F0F13;font-family:'Segoe UI',system-ui,sans-serif;min-height:100vh;color:#E5E7EB;display:flex;flex-direction:column;align-items:center;padding:24px 16px}
h2{font-size:22px;font-weight:700;margin-bottom:16px;background:linear-gradient(135deg,#34D399,#fff);-webkit-background-clip:text;-webkit-text-fill-color:transparent;transition:all .6s}
.sub{font-size:11px;letter-spacing:3px;color:#6B7280;text-transform:uppercase;margin-bottom:8px}
.orb{width:100px;height:100px;border-radius:50%;display:flex;flex-direction:column;align-items:center;justify-content:center;margin-bottom:8px;transition:all .6s}
.orb.speaking{animation:pulse 1.2s ease-in-out infinite}
.status{font-size:12px;color:#9CA3AF;margin-bottom:14px;display:flex;align-items:center;gap:6px}
.dot{width:7px;height:7px;border-radius:50%;background:#34D399;transition:background .4s;flex-shrink:0}
.dot.rec{background:#F87171;animation:blink .8s infinite}
.chatbox{width:100%;max-width:600px;background:#16161D;border-radius:20px;border:1px solid #2A2A3A;display:flex;flex-direction:column;height:400px}
.msgs{flex:1;overflow-y:auto;padding:14px 12px}
.empty{text-align:center;color:#4B5563;margin-top:80px}
.empty .ico{font-size:32px;margin-bottom:8px}
.row{display:flex;margin-bottom:12px;align-items:flex-end}
.row.user{justify-content:flex-end}
.avatar{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px;margin-right:7px;flex-shrink:0}
.bubble{max-width:74%;padding:9px 14px;font-size:14px;line-height:1.6}
.bubble.user{background:#3B3B52;border-radius:18px 18px 4px 18px}
.bubble.ai{border-radius:18px 18px 18px 4px}
.typing{display:none;align-items:center;gap:6px;padding:6px 0}
.typing.show{display:flex}
.tdot{width:6px;height:6px;border-radius:50%;background:#34D399}
.tdot:nth-child(2){animation:bounce 1s .0s infinite}
.tdot:nth-child(3){animation:bounce 1s .15s infinite}
.tdot:nth-child(4){animation:bounce 1s .3s infinite}
.inputrow{padding:10px 12px;border-top:1px solid #2A2A3A;display:flex;gap:8px;align-items:center}
input[type=text]{flex:1;padding:10px 14px;border-radius:22px;background:#0F0F13;border:1px solid #34D39955;color:#E5E7EB;font-size:14px;outline:none;font-family:inherit}
.ibtn{width:42px;height:42px;border-radius:50%;border:none;display:flex;align-items:center;justify-content:center;font-size:18px;cursor:pointer;flex-shrink:0;transition:all .3s}
.micbtn{background:#1F1F2E;border:1.5px solid #3B3B52;color:#9CA3AF}
.micbtn.rec{background:#7F1D1D;border-color:#F87171;color:#FCA5A5;animation:pulse .8s infinite}
.sendbtn{background:#34D399;color:#000}
.sendbtn:disabled{background:#2A2A3A;color:#4B5563;cursor:default}
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:#7F1D1D;border:1px solid #F87171;color:#FCA5A5;padding:10px 18px;border-radius:12px;font-size:13px;z-index:99;max-width:90%;text-align:center;display:none}
.toast.show{display:block;animation:fadeIn .3s}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.07)}}
@keyframes bounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-5px)}}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
@keyframes fadeIn{from{opacity:0;transform:translateX(-50%) translateY(8px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-thumb{background:#2A2A3A;border-radius:4px}
</style>
</head>
<body>

<div class="sub">Emotional AI Voice Assistant</div>
<h2 id="title">আমি তোমার সাথে আছি</h2>

<div class="orb" id="orb">
  <span id="orbEmoji" style="font-size:30px">😌</span>
  <span id="orbLabel" style="font-size:11px;font-weight:600;color:#34D399;margin-top:3px">শান্ত</span>
</div>

<div class="status">
  <div class="dot" id="statusDot"></div>
  <span id="statusTxt">প্রস্তুত — বলো বা লিখো</span>
</div>

<div class="chatbox">
  <div class="msgs" id="msgs">
    <div class="empty" id="emptyMsg">
      <div class="ico">🎙️</div>
      <div>মাইক বোতাম চেপে কথা বলো<br>অথবা টাইপ করো</div>
    </div>
    <div class="typing" id="typing">
      <div class="avatar" id="typAvatar" style="background:#34D39922;border:1px solid #34D39955">😌</div>
      <div class="tdot"></div><div class="tdot"></div><div class="tdot"></div>
    </div>
  </div>
  <div class="inputrow">
    <button class="ibtn micbtn" id="micBtn" onclick="toggleMic()">🎙️</button>
    <input type="text" id="txtInput" placeholder="এখানে টাইপ করো..." oninput="updateSend()" onkeydown="if(event.key==='Enter'&&!event.shiftKey)sendMsg()"/>
    <button class="ibtn sendbtn" id="sendBtn" onclick="sendMsg()" disabled>➤</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const EM = {
  happy:  {emoji:"😊",color:"#F59E0B",label:"আনন্দিত", pitch:1.15,rate:1.05},
  sad:    {emoji:"😢",color:"#60A5FA",label:"দুঃখিত",  pitch:0.85,rate:0.88},
  excited:{emoji:"🤩",color:"#A78BFA",label:"উত্তেজিত",pitch:1.25,rate:1.15},
  calm:   {emoji:"😌",color:"#34D399",label:"শান্ত",    pitch:1.0, rate:0.93},
  angry:  {emoji:"😤",color:"#F87171",label:"রাগান্বিত",pitch:0.9, rate:1.1 },
  curious:{emoji:"🤔",color:"#FBBF24",label:"কৌতূহলী", pitch:1.1, rate:0.98},
};

const SYS = `তুমি একজন আবেগপ্রবণ AI সহকারী। বাংলা ও English মিশিয়ে কথা বলো।
শুধু JSON দাও: {"emotion":"<happy|sad|excited|calm|angry|curious>","text":"<উত্তর>"}
স্বাভাবিক expression ব্যবহার করো যেমন: "আরে!", "সত্যিই?", "wow!", "ওহ no!"
২-৩ বাক্যে উত্তর দাও।`;

let curEmo="calm", isRec=false, isSpeaking=false, isLoading=false;
let history=[], recog=null, selVoice=null;

// Load voices
function loadVoices(){
  const vs=speechSynthesis.getVoices();
  selVoice=vs.find(v=>v.lang==="bn-BD")||vs.find(v=>v.lang==="bn-IN")||vs.find(v=>v.lang.startsWith("bn"))||vs.find(v=>v.lang.startsWith("en-"))||vs[0]||null;
}
loadVoices();
speechSynthesis.onvoiceschanged=loadVoices;

function applyEmo(key){
  curEmo=EM[key]?key:"calm";
  const e=EM[curEmo];
  const orb=document.getElementById("orb");
  orb.style.background=`radial-gradient(circle at 35% 35%,${e.color}99,${e.color}22)`;
  orb.style.border=`2px solid ${e.color}66`;
  orb.style.boxShadow=isSpeaking?`0 0 40px ${e.color}88,0 0 80px ${e.color}44`:`0 0 24px ${e.color}44`;
  document.getElementById("orbEmoji").textContent=e.emoji;
  const lbl=document.getElementById("orbLabel");
  lbl.textContent=e.label; lbl.style.color=e.color;
  const t=document.getElementById("title");
  t.style.background=`linear-gradient(135deg,${e.color},#fff)`;
  t.style.webkitBackgroundClip="text"; t.style.webkitTextFillColor="transparent";
  document.getElementById("statusDot").style.background=isRec?"#F87171":e.color;
  document.getElementById("typAvatar").textContent=e.emoji;
  document.getElementById("typAvatar").style.background=`${e.color}22`;
  document.getElementById("typAvatar").style.border=`1px solid ${e.color}55`;
  document.querySelectorAll(".tdot").forEach(d=>d.style.background=e.color);
  document.getElementById("txtInput").style.borderColor=`${e.color}55`;
  const sb=document.getElementById("sendBtn");
  sb.style.background=sb.disabled?"#2A2A3A":e.color;
  sb.style.color=sb.disabled?"#4B5563":"#000";
}

function setStatus(txt,rec=false){
  document.getElementById("statusTxt").textContent=txt;
  const dot=document.getElementById("statusDot");
  dot.className="dot"+(rec?" rec":"");
  if(!rec) dot.style.background=EM[curEmo].color;
}

function setLoading(v){
  isLoading=v;
  document.getElementById("txtInput").disabled=v;
  document.getElementById("typing").className=v?"typing show":"typing";
  if(v) document.getElementById("msgs").scrollTop=99999;
  updateSend();
}

function updateSend(){
  const sb=document.getElementById("sendBtn");
  const has=document.getElementById("txtInput").value.trim().length>0&&!isLoading;
  sb.disabled=!has;
  sb.style.background=has?EM[curEmo].color:"#2A2A3A";
  sb.style.color=has?"#000":"#4B5563";
}

function showToast(msg){
  const t=document.getElementById("toast");
  t.textContent=msg; t.className="toast show";
  setTimeout(()=>t.className="toast",4000);
}

function addMsg(role,text,emoKey){
  document.getElementById("emptyMsg").style.display="none";
  const e=EM[emoKey]||EM.calm;
  const msgs=document.getElementById("msgs");
  const typing=document.getElementById("typing");
  const row=document.createElement("div");
  row.className="row "+(role==="user"?"user":"ai");
  if(role==="ai"){
    const av=document.createElement("div");
    av.className="avatar";
    av.style.cssText=`background:${e.color}22;border:1px solid ${e.color}55`;
    av.textContent=e.emoji; row.appendChild(av);
  }
  const bub=document.createElement("div");
  bub.className="bubble "+(role==="user"?"user":"ai");
  if(role==="ai") bub.style.cssText=`background:${e.color}18;border:1px solid ${e.color}33`;
  bub.textContent=text; row.appendChild(bub);
  msgs.insertBefore(row,typing);
  msgs.scrollTop=99999;
}

function speakOut(text,emoKey){
  speechSynthesis.cancel();
  const e=EM[emoKey]||EM.calm;
  const utt=new SpeechSynthesisUtterance(text);
  utt.pitch=e.pitch; utt.rate=e.rate; utt.volume=1;
  utt.lang=selVoice?.lang||"bn-BD";
  if(selVoice) utt.voice=selVoice;
  isSpeaking=true;
  document.getElementById("orb").classList.add("speaking");
  document.getElementById("orb").style.boxShadow=`0 0 40px ${e.color}88,0 0 80px ${e.color}44`;
  setStatus("🔊 বলছি...");
  utt.onend=utt.onerror=()=>{
    isSpeaking=false;
    document.getElementById("orb").classList.remove("speaking");
    document.getElementById("orb").style.boxShadow=`0 0 24px ${EM[curEmo].color}44`;
    setStatus("প্রস্তুত — বলো বা লিখো");
  };
  speechSynthesis.speak(utt);
}

async function sendMsg(voiceText){
  const inp=document.getElementById("txtInput");
  const txt=(voiceText!==undefined?voiceText:inp.value).trim();
  if(!txt||isLoading) return;
  inp.value=""; updateSend();
  addMsg("user",txt,curEmo);
  history.push({role:"user",content:txt});
  setLoading(true); setStatus("ভাবছি...");
  try{
    const res=await fetch("https://api.anthropic.com/v1/messages",{
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({model:"claude-sonnet-4-6",max_tokens:1000,system:SYS,messages:history})
    });
    if(!res.ok) throw new Error("API error: "+res.status);
    const data=await res.json();
    const raw=(data.content||[]).map(b=>b.text||"").join("").replace(/```json|```/g,"").trim();
    let reply;
    try{reply=JSON.parse(raw);}catch{reply={emotion:"calm",text:raw||"দুঃখিত, বুঝতে পারিনি!"};}
    const ek=EM[reply.emotion]?reply.emotion:"calm";
    applyEmo(ek);
    history.push({role:"assistant",content:reply.text});
    addMsg("ai",reply.text,ek);
    speakOut(reply.text,ek);
  }catch(err){
    addMsg("ai","দুঃখিত, সমস্যা হয়েছে! আবার try করো।","sad");
    applyEmo("sad");
    showToast("Error: "+err.message);
    setStatus("প্রস্তুত — বলো বা লিখো");
  }finally{setLoading(false);}
}

function toggleMic(){
  if(isLoading||isSpeaking) return;
  const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
  if(!SR){showToast("এই browser-এ mic support নেই। Chrome ব্যবহার করো।");return;}
  if(isRec){recog&&recog.stop();return;}
  speechSynthesis.cancel();
  document.getElementById("txtInput").value=""; updateSend();
  recog=new SR();
  recog.lang="bn-BD";
  recog.interimResults=true;
  recog.continuous=false;
  recog.onstart=()=>{
    isRec=true;
    document.getElementById("micBtn").classList.add("rec");
    document.getElementById("micBtn").textContent="⏹";
    setStatus("🔴 শুনছি...",true);
  };
  recog.onresult=(e)=>{
    let t="";
    for(let i=e.resultIndex;i<e.results.length;i++) t+=e.results[i][0].transcript;
    document.getElementById("txtInput").value=t; updateSend();
  };
  let finalText="";
  recog.onresult=(e)=>{
    let t="";
    for(let i=e.resultIndex;i<e.results.length;i++) t+=e.results[i][0].transcript;
    document.getElementById("txtInput").value=t;
    finalText=t;
    updateSend();
  };
  recog.onend=()=>{
    isRec=false;
    document.getElementById("micBtn").classList.remove("rec");
    document.getElementById("micBtn").textContent="🎙️";
    setStatus("প্রস্তুত — বলো বা লিখো",false);
    if(finalText.trim()) sendMsg(finalText.trim());
  };
  recog.onerror=(e)=>{
    isRec=false;
    document.getElementById("micBtn").classList.remove("rec");
    document.getElementById("micBtn").textContent="🎙️";
    if(e.error==="not-allowed") showToast("⚠️ Microphone permission দাও! Browser settings → এই সাইট → Allow");
    else if(e.error!=="no-speech") showToast("Mic error: "+e.error);
    setStatus("প্রস্তুত — বলো বা লিখো",false);
  };
  try{recog.start();}catch(e){showToast("Mic চালু হচ্ছে না: "+e.message);}
}

applyEmo("calm");
</script>
</body>
</html>
